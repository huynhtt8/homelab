apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stack-configurator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3" # Run after the apps are deployed (wave 2)
spec:
  project: default
  source:
    repoURL: https://github.com/huynhtt8/homelab.git
    targetRevision: main
    path: services/stack-configurator
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
