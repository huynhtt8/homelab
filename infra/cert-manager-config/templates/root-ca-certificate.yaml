apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: homelab-root-ca
  namespace: {{ .Release.Namespace }}
spec:
  isCA: true
  commonName: Homelab Root CA
  secretName: homelab-root-ca-secret
  usages:
    - cert sign
    - crl sign
  privateKey:
    algorithm: ECDSA
    size: 256
  duration: 87600h
  renewBefore: 720h
  issuerRef:
    name: homelab-root
    kind: ClusterIssuer
