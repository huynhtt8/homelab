apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: copyparty-config
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: global-secrets
  target:
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: copyparty.config
