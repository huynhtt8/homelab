app-template:
  fullnameOverride: calibre-web
  controllers:
    main:
      containers:
        main:
          image:
            repository: crocodilestick/calibre-web-automated
            tag: latest
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false
            startup:
              enabled: false
          env:
          - name: PUID
            value: '1000'
          - name: PGID
            value: '1000'
          - name: TZ
            value: Asia/Ho_Chi_Minh
          ports:
          - name: http
            containerPort: 8083
  service:
    main:
      enabled: true
      controller: main
      type: NodePort
      ports:
        http:
          enabled: true
          primary: true
          port: 8083
          nodePort: 31083
          protocol: HTTP
  # Ingress disabled for now — add back when Traefik is set up
  # ingress:
  #   main:
  #     enabled: true
  #     className: traefik
  #     hosts:
  #     - host: library.home.arpa
  #       paths:
  #       - path: "/"
  #         pathType: Prefix
  #         service:
  #           name: main
  #           port: http
  persistence:
    config:
      enabled: true
      type: hostPath
      hostPath: "/mnt/infra-data/calibre-web"
      hostPathType: DirectoryOrCreate
      advancedMounts:
        main:
          main:
          - path: "/config"
    books:
      enabled: true
      type: hostPath
      hostPath: "/mnt/media/library/books"
      hostPathType: DirectoryOrCreate
      advancedMounts:
        main:
          main:
          - path: "/calibre-library"
    ingest:
      enabled: true
      type: hostPath
      hostPath: "/mnt/media/library/books-ingest"
      hostPathType: DirectoryOrCreate
      advancedMounts:
        main:
          main:
          - path: "/cwa-book-ingest"
