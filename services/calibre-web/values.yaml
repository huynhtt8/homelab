app-template:
  fullnameOverride: calibre-web
  controllers:
    main:
      pod:
        nodeSelector:
          node-type: media-worker
      containers:
        main:
          image:
            repository: crocodilestick/calibre-web-automated
            tag: latest
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false
            startup:
              enabled: false
          env:
          - name: PUID
            value: '1000'
          - name: PGID
            value: '1000'
          - name: TZ
            value: Asia/Ho_Chi_Minh
          ports:
          - name: http
            containerPort: 8083
  service:
    main:
      enabled: true
      controller: main
      type: NodePort
      ports:
        http:
          enabled: true
          primary: true
          port: 8083
          nodePort: 31083
          protocol: HTTP
  ingress:
    main:
      enabled: true
      className: traefik
      annotations: {}
      tls:
        - hosts:
            - library.home.arpa
          secretName: calibre-web-tls
      hosts:
      - host: library.home.arpa
        paths:
        - path: "/"
          pathType: Prefix
          service:
            name: main
            port: http
  persistence:
    config:
      enabled: true
      type: hostPath
      hostPath: "/mnt/infra-data/calibre-web"
      hostPathType: Directory
      advancedMounts:
        main:
          main:
          - path: "/config"
    books:
      enabled: true
      type: hostPath
      hostPath: "/mnt/hdd2/library/books"
      hostPathType: Directory
      advancedMounts:
        main:
          main:
          - path: "/calibre-library"
    ingest:
      enabled: true
      type: hostPath
      hostPath: "/mnt/hdd2/library/books-ingest"
      hostPathType: Directory
      advancedMounts:
        main:
          main:
          - path: "/cwa-book-ingest"
