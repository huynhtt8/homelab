app-template:
  fullnameOverride: uptime-kuma
  controllers:
    main:
      pod:
        nodeSelector:
          node-type: infra
      containers:
        main:
          image:
            repository: louislam/uptime-kuma
            tag: latest
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 3001
                initialDelaySeconds: 30
                periodSeconds: 10
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 3001
                initialDelaySeconds: 10
                periodSeconds: 10
            startup:
              enabled: false
          ports:
          - name: web
            containerPort: 3001
  service:
    main:
      enabled: true
      controller: main
      type: ClusterIP
      ports:
        web:
          enabled: true
          primary: true
          port: 3001
          protocol: HTTP
        http:
          enabled: false
  ingress:
    main:
      enabled: true
      className: traefik
      annotations: {}
      tls:
        - hosts:
            - uptime.home.arpa
          secretName: uptime-kuma-tls
      hosts:
      - host: uptime.home.arpa
        paths:
        - path: "/"
          pathType: Prefix
          service:
            name: main
            port: web
  persistence:
    main-config:
      enabled: true
      type: hostPath
      hostPath: "/mnt/infra-data/uptime-kuma"
      hostPathType: DirectoryOrCreate
      advancedMounts:
        main:
          main:
          - path: "/app/data"

