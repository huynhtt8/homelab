apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: qbit-creds
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: central-secrets
  target:
    name: qbit-creds
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: qbit-creds
