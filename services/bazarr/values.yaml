app-template:
  fullnameOverride: bazarr
  controllers:
    main:
      containers:
        main:
          image:
            repository: lscr.io/linuxserver/bazarr
            tag: latest
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false
            startup:
              enabled: false
          env:
          - name: PUID
            value: '1000'
          - name: PGID
            value: '1000'
          - name: TZ
            value: Asia/Ho_Chi_Minh
          ports:
          - name: web
            containerPort: 6767
            hostPort: 6767
  service:
    main:
      enabled: true
      controller: main
      type: ClusterIP
      ports:
        web:
          enabled: true
          primary: true
          port: 6767
          protocol: HTTP
        http:
          enabled: false
  ingress:
    main:
      enabled: true
      className: traefik
      annotations: {}
      hosts:
      - host: bazarr.home.local
        paths:
        - path: "/"
          pathType: Prefix
          service:
            name: main
            port: web
  persistence:
    main-config:
      enabled: true
      type: hostPath
      hostPath: "/mnt/infra-data/bazarr"
      hostPathType: DirectoryOrCreate
      advancedMounts:
        main:
          main:
          - path: "/config"
    main-tv:
      enabled: true
      type: hostPath
      hostPath: "/mnt/media"
      hostPathType: DirectoryOrCreate
      advancedMounts:
        main:
          main:
          - path: "/tv"
    main-movies:
      enabled: true
      type: hostPath
      hostPath: "/mnt/media"
      hostPathType: DirectoryOrCreate
      advancedMounts:
        main:
          main:
          - path: "/movies"
